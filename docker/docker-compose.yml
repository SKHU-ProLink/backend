services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: prolink-skhu
    ports:
      - "8080:8080"
    depends_on:
          - mongo
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
